name: Tafseer
description: An Islamic learning application

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.8.3
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/fonts/
    - assets/icon/icon.png
    - assets/data/
    - assets/data/islamic_qa.json
    - assets/data/hadith.db
    
  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    - family: Noto Serif
      fonts:
        - asset: assets/fonts/NotoSerif-Regular.ttf
        - asset: assets/fonts/NotoSerif-Bold.ttf
          weight: 700
    - family: Noto Nastaliq Urdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icon/icon.png"